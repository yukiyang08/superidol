services:
  - type: web
    name: super-idol-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --log-level info run:app

    envVars:
      - key: DB_HOST
        value: <your-db-host>
      - key: DB_PORT
        value: 5432
      - key: DB_USER
        value: <your-db-user>
      - key: DB_PASSWORD
        value: <your-db-password>
      - key: DB_NAME
        value: <your-db-name>
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: "https://<your-vercel-domain>"
