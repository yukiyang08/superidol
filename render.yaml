services:
  - type: web
    name: super-idol
    env: python

    buildCommand: |
      set -e
      cd super-idol/frontend
      npm ci || npm i
      npm run build
      cd ../..
      pip install -r backend/requirements.txt
      mkdir -p backend/static
      cp -rv frontend/dist/* backend/static/

    startCommand: |
      cd super-idol/backend
      gunicorn --bind 0.0.0.0:$PORT --log-level info run:app

    envVars:
      - key: DB_HOST
        value: <your-db-host>
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        value: <your-db-user>
      - key: DB_PASSWORD
        value: <your-db-password>
      - key: DB_NAME
        value: <your-db-name>
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: "https://<your-vercel-domain>"
      - key: RENDER
        value: "true"
